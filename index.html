<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Escala de Funcionários</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Minha Escala">
</head>
<body>
  <div class="login-container">
    <div class="card">
      <h1>📆 Controle de Escala</h1>
      <p>Digite sua senha numérica</p>
      <input type="password" id="senha" inputmode="numeric" pattern="\d*" maxlength="6" placeholder="Ex: 1234">
      <button id="btnLogin">Entrar</button>
      <div id="erro" class="erro"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
