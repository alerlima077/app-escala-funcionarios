<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Controle de Escala</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Minha Escala">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- Biblioteca para gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f1f5f9;
            padding: 16px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: #0f172a;
            color: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 10px;
            object-fit: contain;
        }
        
        .btn-sair {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* Abas */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: white;
            padding: 6px;
            border-radius: 16px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .tab.active {
            background: #0f172a;
            color: white;
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        /* Botões */
        .btn-primary {
            background: #0f172a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-edit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        th {
            background: #f8fafc;
            font-size: 14px;
        }
        
        td {
            font-size: 14px;
        }
        
        .status-active {
            color: #16a34a;
            font-weight: 600;
        }
        
        .status-inactive {
            color: #dc2626;
        }
        
        /* Tabela de Escala (estilo planilha) */
        .escala-table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .escala-table {
            min-width: 600px;
        }
        
        .escala-table th {
            background: #0f172a;
            color: white;
            padding: 12px 8px;
            font-size: 13px;
            text-align: center;
        }
        
        .escala-table td {
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }
        
        .funcionario-nome {
            font-weight: 600;
            text-align: left;
            background: #f8fafc;
            position: sticky;
            left: 0;
            background: white;
        }
        
        .status-select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 13px;
            width: 100%;
            max-width: 120px;
        }
        
        .horario-input {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 12px;
            width: 100px;
        }
        
        .dia-col {
            background: #f8fafc;
            font-weight: 600;
        }
        
        .btn-salvar-escala {
            margin-top: 16px;
            width: 100%;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }
        
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .status-select, .horario-input {
                font-size: 12px;
                padding: 6px;
            }
            
            .escala-table th, .escala-table td {
                padding: 6px 4px;
            }
        }

        /* Ajustes da tabela de escala */
        .escala-table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .escala-table {
            min-width: 700px;
            border-collapse: collapse;
            width: 100%;
        }

        .escala-table th,
        .escala-table td {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 6px;
            text-align: center;
            vertical-align: top;
        }

        .escala-table th:last-child,
        .escala-table td:last-child {
            border-right: none;
        }

        /* Coluna do funcionário (fixa) */
        .escala-table .funcionario-nome {
            background: #f8fafc;
            font-weight: 600;
            text-align: left;
            position: sticky;
            left: 0;
            min-width: 130px;
        }

        /* Selects e inputs dentro da tabela */
        .escala-table select,
        .escala-table input {
            font-size: 12px;
            padding: 6px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            width: 100%;
            max-width: 130px;
        }

        .escala-table .status-select {
            margin-bottom: 6px;
        }

        /* ========== RESPONSIVO PARA PC (SEM ROLAGEM) ========== */
        @media (min-width: 1200px) {
            .escala-table-container {
                overflow-x: visible;
            }
            
            .escala-table {
                min-width: 100%;
                table-layout: fixed;
            }
            
            .escala-table th {
                font-size: 12px;
                padding: 10px 4px;
                white-space: nowrap;
            }
            
            .escala-table td {
                padding: 8px 4px;
            }
            
            .escala-table select,
            .escala-table input {
                font-size: 11px;
                padding: 5px;
                max-width: 115px;
            }
            
            .escala-table .funcionario-nome {
                min-width: 120px;
            }
        }

        /* ========== RESPONSIVO PARA NOTEBOOK ========== */
        @media (min-width: 768px) and (max-width: 1199px) {
            .escala-table-container {
                overflow-x: auto;
            }
            
            .escala-table {
                min-width: 800px;
            }
            
            .escala-table th {
                font-size: 11px;
                padding: 8px 3px;
            }
            
            .escala-table td {
                padding: 6px 3px;
            }
            
            .escala-table select,
            .escala-table input {
                font-size: 10px;
                padding: 4px;
                max-width: 105px;
            }
        }

        /* ========== RESPONSIVO PARA CELULAR ========== */
        @media (max-width: 767px) {
            .escala-table-container {
                overflow-x: auto;
            }
            
            .escala-table {
                min-width: 700px;
            }
            
            .escala-table th,
            .escala-table td {
                font-size: 10px;
                padding: 6px 3px;
            }
            
            .escala-table select,
            .escala-table input {
                font-size: 9px;
                padding: 4px;
                max-width: 95px;
            }
        }

        /* Estilos para a tabela de pagamentos */
        .pagamentos-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .pagamentos-table th {
            background: #0f172a;
            color: white;
            padding: 12px;
            font-size: 13px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .pagamentos-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .funcionario-col {
            font-weight: 600;
            text-align: left;
            background: #f8fafc;
            position: sticky;
            left: 0;
        }

        .dia-pago {
            background: #dcfce7;
            color: #166534;
        }

        .dia-nao-pago {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-pagar {
            background: #16a34a;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }

        .btn-pagar:hover {
            background: #15803d;
        }

        .pago-badge {
            background: #16a34a;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .resumo-pagamento {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .resumo-pagamento h4 {
            margin-bottom: 10px;
            color: #0f172a;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .resumo-total {
            font-weight: bold;
            color: #0f172a;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #cbd5e1;
        }

                /* Botões de pagamento melhorados */
        .btn-pagar-custom {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-pagar-custom:hover {
            background: #d97706;
            transform: scale(1.05);
        }

        .badge-pago {
            background: #16a34a;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        /* ========== CORREÇÃO DA TABELA DE PAGAMENTOS ========== */

        /* Container com scroll horizontal */
        .pagamentos-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        /* Tabela de pagamentos */
        .pagamentos-table {
            min-width: 800px;
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .pagamentos-table th {
            background: #0f172a;
            color: white;
            padding: 10px 6px;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }

        .pagamentos-table td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        /* Coluna do funcionário fixa */
        .pagamentos-table .funcionario-col {
            background: #f8fafc;
            font-weight: 600;
            position: sticky;
            left: 0;
            min-width: 120px;
            text-align: left;
            padding: 8px 12px;
        }

        /* Botões dentro da tabela */
        .pagamentos-table .btn-pagar {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }

        .pagamentos-table .btn-pagar:hover {
            background: #d97706;
        }

        .pagamentos-table .pago-badge {
            background: #16a34a;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            display: inline-block;
        }

        .pagamentos-table .desfazer-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 4px;
            white-space: nowrap;
        }

        /* Células de dia */
        .pagamentos-table .dia-pago {
            background: #dcfce7;
        }

        .pagamentos-table .dia-nao-pago {
            background: #fff;
        }

        /* Resumo de pagamento */
        .resumo-pagamento {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .resumo-pagamento h4 {
            margin-bottom: 10px;
            color: #0f172a;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .resumo-total {
            font-weight: bold;
            color: #0f172a;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #cbd5e1;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .pagamentos-table {
                font-size: 10px;
            }
            
            .pagamentos-table .funcionario-col {
                min-width: 100px;
            }
            
            .pagamentos-table th,
            .pagamentos-table td {
                padding: 6px 3px;
            }
            
            .pagamentos-table .btn-pagar {
                padding: 4px 6px;
                font-size: 9px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
                <h2 style="font-size: 1.2rem;">👨‍💼 Painel Admin</h2>
            </div>
            <button class="btn-sair" onclick="logout()">🚪 Sair</button>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="mudarTab('funcionarios')">👥 Funcionários</button>
            <button class="tab" onclick="mudarTab('escala')">📅 Escala</button>
            <button class="tab" onclick="mudarTab('pagamentos')">💰 Pagamentos</button>
        </div>
        
        <!-- Aba Funcionários -->
        <div id="tab-funcionarios" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h3>📋 Funcionários</h3>
                    <button class="btn-primary" onclick="abrirModalFuncionario()">+ Novo</button>
                    <button class="btn-primary" onclick="limparTodosDados()" style="background: #dc2626;">🗑️ Limpar Todos Dados</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Nome</th><th>Senha</th><th>Diária</th><th>Status</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="listaFuncionarios"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Aba Escala (estilo tabela) -->
        <div id="tab-escala" class="tab-content" style="display: none;">
            <div class="card">
                <h3>📅 Escala Semanal</h3>
                <p style="font-size: 12px; color: #64748b; margin-bottom: 16px;">
                    👆 Selecione a semana e defina o status e horário para cada funcionário
                </p>
                
                <div style="display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;">
                    <input type="date" id="dataInicio" style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1;">
                    <button class="btn-primary" onclick="carregarSemana()">📆 Carregar Semana</button>
                </div>
                
                <div class="escala-table-container">
                    <table class="escala-table" id="escalaTable">
                        <thead id="escalaHeader">
                            <!-- Cabeçalho será preenchido via JS -->
                        </thead>
                        <tbody id="escalaBody">
                            <!-- Corpo será preenchido via JS -->
                        </tbody>
                    </table>
                </div>
                
                <button class="btn-primary btn-salvar-escala" onclick="salvarEscalaSemana()">💾 Salvar Escala da Semana</button>
            </div>
        </div>
        
        <!-- Aba Pagamentos -->
        <div id="tab-pagamentos" class="tab-content" style="display: none;">
            <div class="card">
                <h3>💰 Controle de Pagamentos</h3>
                <p style="font-size: 12px; color: #64748b; margin-bottom: 16px;">
                    ✅ Marque os dias que já foram pagos para cada funcionário
                </p>
                
                <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="month" id="mesPagamento" style="padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1;">
                    <button class="btn-primary" onclick="carregarPagamentos()">📆 Carregar Mês</button>
                    <button class="btn-primary" onclick="marcarTodosPagos()" style="background: #16a34a;">✅ Marcar Todos Pagos</button>
                    <button onclick="desfazerTodosPagamentos()" style="background: #dc2626; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">
                        🔄 Desfazer Todos
                    </button>
                </div>
                
                <div id="pagamentosContainer" class="pagamentos-container">
                    <div class="loading">Selecione um mês para visualizar</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Funcionário -->
    <div id="modalFuncionario" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h3 id="modalTitle">Novo Funcionário</h3>
            <form id="formFuncionario">
                <input type="hidden" id="funcionarioId">
                <div class="form-group">
                    <label>Nome:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label>Senha (4-6 números):</label>
                    <input type="password" id="senha" inputmode="numeric" maxlength="6" required>
                </div>
                <div class="form-group">
                    <label>Diária (R$):</label>
                    <input type="number" id="diaria" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="status" checked> Ativo
                    </label>
                </div>
                <button type="submit" class="btn-primary">Salvar</button>
            </form>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
